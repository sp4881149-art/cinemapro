<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinema Pro - OTT Platform</title>
    <meta name="google-site-verification" content="yLm6L4m21XST1wXZ2TxOkp-6YuRimE9fZvDYco6_27g" />
    <style>
        body { background-color: #050505; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; }
        
        /* Navbar */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background: #000; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 28px; font-weight: 800; color: #e50914; }
        .search-bar { padding: 10px; width: 300px; border-radius: 5px; border: 1px solid #444; background: #222; color: white; }

        /* Genre Tags */
        .genre-container { padding: 20px 40px; display: flex; gap: 10px; flex-wrap: wrap; }
        .genre-tag { padding: 10px 20px; background: #1a1a1a; border: 1px solid #333; color: #ddd; border-radius: 25px; font-size: 14px; cursor: pointer; transition: 0.3s; }
        .genre-tag:hover { background: #e50914; color: white; border-color: #e50914; }

        /* Sections */
        .section { padding: 20px 40px; }
        .section h2 { margin-bottom: 20px; font-size: 22px; color: #fff; }
        .movie-row { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; }
        .movie-card { min-width: 160px; height: 230px; background: #111; border-radius: 8px; display: flex; align-items: center; justify-content: center; text-align: center; color: #555; font-size: 14px; border: 1px solid #222; cursor: pointer; }
        
        ::-webkit-scrollbar { height: 8px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">Cinema Pro</div>
        <input type="text" class="search-bar" placeholder="Search movies or shows...">
    </nav>

    <div class="genre-container">
        <span class="genre-tag">Action</span>
        <span class="genre-tag">Comedy</span>
        <span class="genre-tag">Adventure</span>
        <span class="genre-tag">Sci-Fi</span>
        <span class="genre-tag">Horror</span>
    </div>

    <div class="section">
        <h2>Bollywood</h2>
        <div class="movie-row">
            <div class="movie-card">Movie 1</div>
            <div class="movie-card">Movie 2</div>
        </div>

        <h2>Hollywood</h2>
        <div class="movie-row">
            <div class="movie-card">Movie 1</div>
            <div class="movie-card">Movie 2</div>
        </div>
        
        <h2>South Movies</h2>
        <div class="movie-row">
            <div class="movie-card">South Movie 1</div>
            <div class="movie-card">South Movie 2</div>
        </div>

        <h2>Web Series</h2>
        <div class="movie-row">
            <div class="movie-card">Series 1</div>
            <div class="movie-card">Series 2</div>
        </div>

        <h2>Anime</h2>
        <div class="movie-row">
            <div class="movie-card">Anime 1</div>
            <div class="movie-card">Anime 2</div>
        </div>

        <h2>TV Shows</h2>
        <div class="movie-row">
            <div class="movie-card">Show 1</div>
            <div class="movie-card">Show 2</div>
        </div>
    </div>

</body>
</html>
